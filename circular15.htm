<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>መተግበሪያ ለመፍትሔ</title>
  <link rel="stylesheet" href="circular.css">
</head>
<body>

    <div class="con">
      <h2><a href="menu.htm">5, የስልጠና ማዕከሉን የአገልግሎት አሰጣጥ አቅም ማሳደግ</a></h2>
    </div>

  <div class="container">    
    <div class="card">          
          <div class="percent" style="--clr:#04fc43;--num:100;">
        <div class="dot"></div>
        <svg>
          <circle cx="70" cy="70" r="70"></circle>
          <circle cx="70" cy="70" r="70"></circle>          
        </svg>        
        <div class="number">
          <h2>100<span>%</span></h2>          
        </div>        
      </div>
      <p>5.1<br>የሥልጠና አገልግሎት አሰጣጥ ስታንዳርድ ከ50% ወደ60% ማሳደግ</p>      
    </div>

  <div class="container">    
    <div class="card">          
          <div class="percent" style="--clr:#04fc43;--num:53;">
        <div class="dot"></div>
        <svg>
          <circle cx="70" cy="70" r="70"></circle>
          <circle cx="70" cy="70" r="70"></circle>          
        </svg>        
        <div class="number">
          <h2>53<span>%</span></h2>          
        </div>        
      </div>
      <p>5.2<br>የቴክኖሎጅ ስልጠና እና ምርምር ውጤታማትነት ከ50% ወደ 60% ማሳድግ</p>
    </div>

  <div class="container">    
    <div class="card">          
          <div class="percent" style="--clr:#04fc43;--num:69;">
        <div class="dot"></div>
        <svg>
          <circle cx="70" cy="70" r="70"></circle>
          <circle cx="70" cy="70" r="70"></circle>          
        </svg>        
        <div class="number">
          <h2>69<span>%</span></h2>          
        </div>        
      </div>
      <p>5.3<br>ለ1240 ለውስጥ ሰራተኛና ለውጭ ተገልጋይ ስልጠና መስጠት</p>
    </div>

  </div>     
</body>
</html>
