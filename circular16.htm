<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>መተግበሪያ ለመፍትሔ</title>
  <link rel="stylesheet" href="circular.css">
</head>
<body>

    <div class="con">
      <h2><a href="menu.htm">6, የአደጋ ምላሽ ስትራቴጂክ አገልግሎቶችን ማሳደግ</a></h2>
    </div>

  <div class="container">    
    <div class="card">          
          <div class="percent" style="--clr:#04fc43;--num:10;">
        <div class="dot"></div>
        <svg>
          <circle cx="70" cy="70" r="70"></circle>
          <circle cx="70" cy="70" r="70"></circle>          
        </svg>        
        <div class="number">
          <h2>10<span>%</span></h2>          
        </div>        
      </div>
      <p>6.1 <br>የአደጋ ምላሽ አሰጣጥ ስታንዳርድ አፈፃፀም ከ 90 ወደ 91.6 % ማድረስ</p>
    </div>

  <div class="container">    
    <div class="card">          
          <div class="percent" style="--clr:#04fc43;--num:45;">
        <div class="dot"></div>
        <svg>
          <circle cx="70" cy="70" r="70"></circle>
          <circle cx="70" cy="70" r="70"></circle>          
        </svg>        
        <div class="number">
          <h2>45<span>%</span></h2>          
        </div>        
      </div>
      <p>6.2<br> የአደጋ ምላሽ አገልግሎት አሰጣጥ በማሳደግ የማዳን አቅም ከ90 ወደ 91.6 % ማድረስ</p>
    </div>

  <div class="container">    
    <div class="card">          
          <div class="percent" style="--clr:#04fc43;--num:90;">
        <div class="dot"></div>
        <svg>
          <circle cx="70" cy="70" r="70"></circle>
          <circle cx="70" cy="70" r="70"></circle>          
        </svg>        
        <div class="number">
          <h2>90<span>%</span></h2>          
        </div>        
      </div>
      <p>6.3 <br>የአደጋ መረጃ ተደራሽነትንና ውጤታማነትን ከ80.9 ወደ 82% ማሻሻል</p>
    </div>

  <div class="container">    
    <div class="card">          
          <div class="percent" style="--clr:#04fc43;--num:60;">
        <div class="dot"></div>
        <svg>
          <circle cx="70" cy="70" r="70"></circle>
          <circle cx="70" cy="70" r="70"></circle>          
        </svg>        
        <div class="number">
          <h2>60<span>%</span></h2>          
        </div>        
      </div>
      <p>6.4<br>የድንገተኛ አደጋዎች እና የአደጋ ሰራተኞች ህክምና 100% ተደራሽ ማድረግ</p>
    </div>

  </div>  
</body>
</html>
