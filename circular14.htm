<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>መተግበሪያ ለመፍትሔ</title>
  <link rel="stylesheet" href="circular.css">
</head>
<body>

    <div class="con">
      <h2><a href="menu.htm">4, የአደጋ ማሽነሪዎችና ደጋፊ መሳሪያዎችን ዝግጁነት አቅም ማሳደግ</a></h2>
    </div>

    <div class="container">    
    <div class="card">          
          <div class="percent" style="--clr:#04fc43;--num:78;">
        <div class="dot"></div>
        <svg>
          <circle cx="70" cy="70" r="70"></circle>
          <circle cx="70" cy="70" r="70"></circle>          
        </svg>        
        <div class="number">
          <h2>78<span>%</span></h2>          
        </div>        
      </div>
      <p>4.1<br>የአደጋ ማሽነሪና ተሸከርካሪ ዝግጁነት ከ90 ወደ 92% ማድረስ</p>
    </div>

  <div class="container">    
    <div class="card">          
          <div class="percent" style="--clr:#04fc43;--num:83;">
        <div class="dot"></div>
        <svg>
          <circle cx="70" cy="70" r="70"></circle>
          <circle cx="70" cy="70" r="70"></circle>          
        </svg>        
        <div class="number">
          <h2>83<span>%</span></h2>          
        </div>        
      </div>
      <p>4.2<br>የአደጋ ማሽነሪና ተሸከርካሪ ፕሮፋይል ከ85% ወደ 88% ማዘጋጀት</p>
    </div>

  <div class="container">    
    <div class="card">          
          <div class="percent" style="--clr:#04fc43;--num:91;">
        <div class="dot"></div>
        <svg>
          <circle cx="70" cy="70" r="70"></circle>
          <circle cx="70" cy="70" r="70"></circle>          
        </svg>        
        <div class="number">
          <h2>91<span>%</span></h2>          
        </div>        
      </div>
      <p>4.3<br>ለተሸከርካሪ ጥገና የሚያስፈልጉ ግብዓት ከ 50% ወደ 56 % ማድረስ መገለጫ</p>
    </div>

  </div>    
</body>
</html>
