<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>መተግበሪያ ለመፍትሔ</title>
  <link rel="stylesheet" href="circular.css">
</head>
<body>

    <div class="con">
      <h2><a href="menu.htm">7, የድህረ አደጋ ምላሽ አገልግሎቶች ተደራሽነትን ማሳደግ</a></h2>
    </div>

  <div class="container">    
    <div class="card">          
          <div class="percent" style="--clr:#04fc43;--num:90;">
        <div class="dot"></div>
        <svg>
          <circle cx="70" cy="70" r="70"></circle>
          <circle cx="70" cy="70" r="70"></circle>          
        </svg>        
        <div class="number">
          <h2>90<span>%</span></h2>          
        </div>
      </div>
        <p>7.1 <br>የአደጋ ተጎጂዎች የመጠባበቂያ ግብዓት ማከማቸትና 100% ማስተዳደር</p>      
    </div>

  <div class="container">    
    <div class="card">          
          <div class="percent" style="--clr:#04fc43;--num:5;">
        <div class="dot"></div>
        <svg>
          <circle cx="70" cy="70" r="70"></circle>
          <circle cx="70" cy="70" r="70"></circle>          
        </svg>        
        <div class="number">
          <h2>5<span>%</span></h2>          
        </div>        
      </div>
      <p>7.2<br>የአስቸኳይ ጊዜ ዕለት እርዳታና የስነልቦና ግንባታ ለሚያስፈልጋቸው የአደጋ ተጎጂ ዜጎች ድጋፍ ከ50% ወደ70% ማድረግ</p>
    </div>

  <div class="container">    
    <div class="card">          
          <div class="percent" style="--clr:#04fc43;--num:65;">
        <div class="dot"></div>
        <svg>
          <circle cx="70" cy="70" r="70"></circle>
          <circle cx="70" cy="70" r="70"></circle>          
        </svg>        
        <div class="number">
          <h2>65<span>%</span></h2>          
        </div>        
      </div>
      <p>7.3<br>የመልሶ ግንባታ እና በዘላቂነት መልሶ ማቋቋም የሚያስፈልጋቸውን የአደጋ ተጎጂዎች100% አገልግሎት እንዲያገኙ ማድረግ</p>
    </div>

  </div>  
</body>
</html>
