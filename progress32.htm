<!DOCTYPE html>

<body>

  <div class="container">

    <div class="con">
      <h2><a href="circular13.htm">3.2 በኮሚሽኑ ስራ ላያ ያሉ ሲስተሞችን 100% መጠገንና ማስተዳደር</a></h2>
    </div>

      <div class="info">
        <span>3.2.3<br>የሲስተም ማሻሻያ ስራ መስራት</span>
