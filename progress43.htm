<!DOCTYPE html>

<body>

  <div class="container">

    <div class="con">
      <h2><a href="circular14.htm">4.3 የተሸከርካሪ ጥገና የሚያስፈልጉ ግብዓት ከ 50% ወደ 56 % ማድረስ መገለጫ</a></h2>
    </div>

    <div class="skill">
      <div class="info">
        <span>4.3.1<br>የእጅ መርጃ መሳሪያዎችና የመለዋወጫዎችን ፍላጎት 50% ማከናወን</span>

      </div>
      <div class="bar">
        <div class="progress" style="--width:90%"></div>
      </div>
    </div>

    <div class="skill">
      <div class="info">
        <span>4.3.3<br>የተሸከርካሪ ግብዓት ስርጭት 100% ማከናወን</span>
        <span>50%</span>

        <div class="progress" style="--width:50%"></div>
      </div>
