<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>መተግበሪያ ለመፍትሔ</title>
  <link rel="stylesheet" href="progress1.css">
</head>
<body>

  <div class="container">

    <div class="con">
      <h2><a href="circular13.htm">3.5 የአደጋ መረጃ አገልግሎት 100% ተደራሽነትን ማረጋገጥ</a></h2>
    </div>

    <div class="skill">
      <div class="info">
        <span>3.5.1<br>የአደጋ መረጃ ፕሮፋይል 1 ማዘጋጀት</span>
        <span>95%</span>
      </div>
      <div class="bar">
        <div class="progress" style="--width:95%"></div>
      </div>
    </div>

    <div class="skill">
      <div class="info">
        <span>3.5.2<br>የአደጋ መረጃ ወደ ቋት (ዳታቤዝ) 100% ማስገባት</span>
        <span>90%</span>
      </div>
      <div class="bar">
        <div class="progress" style="--width:90%"></div>
      </div>
    </div>

    <div class="skill">
      <div class="info">
        <span>3.5.3<br>የአደጋ መረጃ ለሚመለከተው አካል 100 % ማሰራጨት</span>
        <span>50%</span>
      </div>
      <div class="bar">
        <div class="progress" style="--width:50%"></div>
      </div>
    </div>

    <div class="skill">
      <div class="info">
        <span>3.5.4<br>ለ4 ጊዜ የአደጋ ስጋትና ክስትት ቦታዎች የትንታኔ ሰነድ በማዘጋጀት ለሚመለከታቸው አካላት ማሰራጨት</span>
        <span>80%</span>
      </div>
      <div class="bar">
        <div class="progress" style="--width:80%"></div>
      </div>
    </div>

    <div class="skill">
      <div class="info">
        <span>3.5.5<br>በኮሚሽኑ የአይቲ ፖሊሲ መሰረት 48 የመረጃ ቅጂ (Backup) መያዝ</span>
        <span>80%</span>
      </div>
      <div class="bar">
        <div class="progress" style="--width:80%"></div>
      </div>
    </div>

  </div>
</body>
</html>
